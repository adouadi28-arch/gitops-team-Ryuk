apiVersion: v1
kind: Service
metadata:
  name: todo-api-bluegreen-active
  namespace: todo-api-bluegreen
spec:
  type: ClusterIP
  selector:
    app: todo-api-bluegreen
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: todo-api-bluegreen-preview
  namespace: todo-api-bluegreen
spec:
  type: ClusterIP
  selector:
    app: todo-api-bluegreen
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
