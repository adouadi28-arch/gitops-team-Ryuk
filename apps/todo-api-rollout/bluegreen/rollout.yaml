apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: todo-api-bluegreen
  namespace: todo-api-bluegreen
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todo-api-bluegreen
  template:
    metadata:
      labels:
        app: todo-api-bluegreen
    spec:
      containers:
        - name: todo-api
          image: ghcr.io/adouadi28-arch/todo-api-python:latest
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
  strategy:
    blueGreen:
      activeService: todo-api-bluegreen-active
      previewService: todo-api-bluegreen-preview
      autoPromotionEnabled: false   # promotion manuelle — on valide le preview avant de basculer
